# ===============================
# DATABASE CONFIGURATION (AWS RDS PostgreSQL)
# ===============================

spring.datasource.url=jdbc:postgresql://bus-tracking-db.cns8oemiwvv3.eu-north-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=skkabaddi63
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false


# ===============================
# HIKARI CONNECTION POOL
# ===============================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000


# ===============================
# FILE UPLOAD LIMIT
# ===============================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.max-http-request-header-size=2MB


# ===============================
# STATIC RESOURCE CACHE DISABLE
# ===============================

spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true


# ===============================
# SERVER CONNECTION SETTINGS
# ===============================

server.tomcat.keep-alive-timeout=60000
server.tomcat.max-keep-alive-requests=1000
server.tomcat.connection-timeout=60000


# ===============================
# SERVER PORT
# ===============================

server.port=8080