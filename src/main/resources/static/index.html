<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BusTrack - Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=auth.html">
    <link rel="icon" href="./logo.png">
</head>

<body>
    <script>
        // Automatic Session Redirection
        (function() {
            const admin = localStorage.getItem("admin");
            const driver = localStorage.getItem("driver");
            const client = localStorage.getItem("client");

            if (admin) {
                window.location.href = 'admin-frontend/admin.html';
            } else if (driver) {
                window.location.href = 'driver-frontend/index.html';
            } else if (client) {
                window.location.href = 'client-frontend/index.html';
            } else {
                window.location.href = 'auth.html';
            }
        })();
    </script>
</body>

</html>
